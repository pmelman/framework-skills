name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install jsonschema
      - name: Validate skills against the JSON Schema
        run: python scripts/validate.py
      - name: Check index.json is regenerated
        run: python scripts/generate_index.py --check
